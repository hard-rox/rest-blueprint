name: Publish Template to NuGet

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # e.g. v1.0.0, v1.2.3
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish (e.g. 1.0.0-preview.1)"
        required: true
        default: "1.0.0"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — End-to-end template validation
  # Packs the template, installs it locally, scaffolds a project, and builds it.
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Pack & Validate Template
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve package version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Strip leading 'v' from the tag name (v1.2.3 → 1.2.3)
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Pack template
        run: |
          dotnet pack RestBlueprint.Template.csproj \
            -c Release \
            -o nupkg \
            -p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Install template from local package
        run: dotnet new install ./nupkg/RestBlueprint.Template.${{ steps.version.outputs.version }}.nupkg

      - name: Scaffold a project from the template
        run: dotnet new rest-blueprint -n TestApp -o ./scaffolded

      - name: Build the scaffolded project
        run: dotnet build ./scaffolded/TestApp.Api.csproj -c Release

      - name: Uninstall local template
        if: always()
        run: dotnet new uninstall RestBlueprint.Template

      - name: Upload nupkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: nupkg/*.nupkg

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Publish to NuGet.org
  # Only runs after test passes. Requires NUGET_API_KEY repository secret.
  # ─────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to NuGet.org
    runs-on: ubuntu-latest
    needs: test

    # Only publish on tag pushes, not on manual workflow_dispatch runs
    # (to avoid accidentally publishing a dev build).
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    environment: nuget-publish   # optional: add a GitHub environment with protection rules

    steps:
      - name: Download nupkg artifact
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: nupkg

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Push to NuGet.org
        run: |
          dotnet nuget push nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
